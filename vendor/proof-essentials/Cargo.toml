# Vendored from geometryresearch/proof-toolbox (proof-essentials).
# Ported: arkworks 0.3 -> 0.6, Starknet curve -> Baby Jubjub (ark-ed-on-bn254).
# See ../README.md for provenance and license.
[package]
name = "proof-essentials"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[dependencies]
ark-crypto-primitives = "0.6"
ark-ec = "0.6"
ark-ff = "0.6"
ark-serialize = "0.6"
ark-std = { version = "0.6", features = ["std"] }
ark-ed-on-bn254 = "0.6"          # Baby Jubjub (replaces starknet-curve)
merlin = "3.0.0"
rand = "0.8.4"
rand_chacha = "0.3"              # inner RNG for the FiatShamirRng replacement
thiserror = "1.0.30"
# NOTE (M2 port): ark-marlin has no 0.6 release. Its only use was
# `ark_marlin::rng::FiatShamirRng`, replaced by the in-tree
# `zkp::fiat_shamir_rng` Blake2-based transcript RNG. Dependency removed.
blake2 = { version = "0.10", default-features = false }
digest = { version = "0.10" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
criterion = "0.3"
wasm-bindgen-test = "0.3.29"

# NOTE (M2 port): the `shuffle` bench depends on the not-yet-ported zkp arguments
# layer; re-enable once that layer is ported.
# [[bench]]
# name = "shuffle"
# harness = false
